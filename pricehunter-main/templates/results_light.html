<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - PriceHunter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        /* Custom animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        .animate-fadeInDown { animation: fadeInDown 0.8s ease-out; }
        .animate-fadeInUp { animation: fadeInUp 0.8s ease-out; }
        .pulse-subtle { animation: pulse-subtle 2s infinite; }
        
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }
        
        /* Button ripple effect */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        
        .ripple::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .ripple:active::before {
            width: 300px;
            height: 300px;
        }
        
        /* Best deal glow effect */
        .best-deal-glow {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3), 0 0 20px rgba(16, 185, 129, 0.1);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Sticky Navbar -->
    <nav class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <a href="/" class="flex items-center">
                        <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-green-500 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                        <span class="ml-2 text-xl font-bold text-gray-900">PriceHunter</span>
                    </a>
                </div>

                <!-- Search Bar -->
                <div class="flex-1 max-w-2xl mx-8">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                        <form action="/search" method="post" class="w-full">
                            <input 
                                type="text" 
                                name="query" 
                                value="{{ query }}"
                                placeholder="Search for products..." 
                                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300 text-gray-900 placeholder-gray-500"
                            >
                        </form>
                    </div>
                </div>

                <!-- Filter Buttons -->
                <div class="flex items-center space-x-2">
                    <button onclick="filterProducts('all')" class="filter-btn px-3 py-1.5 text-sm font-medium text-white bg-blue-500 rounded-lg hover:bg-blue-600 transition-all duration-300 transform hover:scale-105 ripple" data-filter="all">
                        All
                    </button>
                    <button onclick="filterProducts('amazon')" class="filter-btn px-3 py-1.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 hover:border-gray-400 transition-all duration-300 transform hover:scale-105 ripple" data-filter="amazon">
                        Amazon
                    </button>
                    <button onclick="filterProducts('flipkart')" class="filter-btn px-3 py-1.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 hover:border-gray-400 transition-all duration-300 transform hover:scale-105 ripple" data-filter="flipkart">
                        Flipkart
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Results Header -->
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
                <div class="mb-4 sm:mb-0">
                    <h1 class="text-2xl font-bold text-gray-900">Search Results</h1>
                    <p class="text-gray-600">Showing results for <span class="font-medium text-blue-600">"{{ query }}"</span></p>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="inline-flex items-center px-3 py-1.5 bg-blue-50 border border-blue-200 rounded-lg">
                        <span class="text-blue-600 font-semibold">{{ results|length }}</span>
                        <span class="text-gray-600 ml-1">products found</span>
                    </div>
                    
                    <select onchange="sortProducts(this.value)" class="px-3 py-1.5 border border-gray-300 rounded-lg text-gray-700 bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300">
                        <option value="relevance">Sort by: Relevance</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Rating</option>
                        <option value="savings">Best Savings</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Products Grid -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 animate-fadeInUp">
            <!-- Products will be dynamically inserted here -->
        </div>

        <!-- Loading Skeletons -->
        <div id="loadingSkeletons" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            {% for i in range(8) %}
                <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                    <div class="skeleton aspect-[4/5]"></div>
                    <div class="p-5 space-y-3">
                        <div class="skeleton h-4 rounded"></div>
                        <div class="skeleton h-4 w-3/4 rounded"></div>
                        <div class="skeleton h-6 w-1/2 rounded"></div>
                        <div class="skeleton h-4 w-1/3 rounded"></div>
                    </div>
                </div>
            {% endfor %}
        </div>

        <!-- No Results State -->
        <div id="noResultsState" class="hidden text-center py-24">
            <div class="inline-flex items-center justify-center w-24 h-24 bg-gray-100 rounded-full mb-8">
                <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-light text-gray-900 mb-4">No products found</h2>
            <p class="text-gray-600 mb-8 max-w-lg mx-auto">
                We couldn't find any products matching <span id="searchQuery" class="font-medium text-gray-900">""</span>. Try searching with different keywords.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button onclick="retrySearch()" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-lg transition-all duration-300 transform hover:scale-105 ripple">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Retry Search
                </button>
                <div class="flex flex-wrap gap-2 justify-center">
                    <span onclick="quickSearch('iPhone')" class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 hover:border-gray-400 transition-all duration-300 cursor-pointer">iPhone</span>
                    <span onclick="quickSearch('Laptop')" class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 hover:border-gray-400 transition-all duration-300 cursor-pointer">Laptop</span>
                    <span onclick="quickSearch('Headphones')" class="px-3 py-1.5 bg-white border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 hover:border-gray-400 transition-all duration-300 cursor-pointer">Headphones</span>
                </div>
            </div>
        </div>

        <!-- Load More Button -->
        <div id="loadMoreContainer" class="hidden text-center mt-12">
            <button onclick="loadMoreProducts()" class="px-8 py-3 bg-white border border-gray-300 hover:bg-gray-50 hover:border-gray-400 text-gray-700 font-medium rounded-lg transition-all duration-300 transform hover:scale-105">
                Load More Products
            </button>
        </div>
    </div>

    <script>
        // Global variables
        let allProducts = [];
        let filteredProducts = [];
        let currentFilter = 'all';
        let currentSort = 'relevance';
        let isLoading = false;

        // Initialize products from backend data
        const backendProducts = {{ results | tojson if results else '[]' }};
        
        // Product data structure enhancement
        function enhanceProductData(products) {
            return products.map(product => ({
                ...product,
                savings: product.original_price && product.original_price !== product.current_price 
                    ? product.original_price - product.current_price 
                    : 0,
                savingsPercentage: product.original_price && product.original_price !== product.current_price
                    ? Math.round(((product.original_price - product.current_price) / product.original_price) * 100)
                    : 0,
                ratingValue: parseFloat(product.rating) || 0
            }));
        }

        // Create product card HTML
        function createProductCard(product) {
            const hasDiscount = product.original_price && product.original_price !== product.current_price;
            const isBestDeal = hasDiscount && product.savings > 0;
            
            // Build product URL with proper encoding
            const productUrl = `/product?name=${encodeURIComponent(product.name)}&platform=${encodeURIComponent(product.platform)}&current_price=${encodeURIComponent(product.current_price)}&original_price=${encodeURIComponent(product.original_price || '')}&image_url=${encodeURIComponent(product.image_url || '')}&listing_url=${encodeURIComponent(product.listing_url || '')}&in_stock=${encodeURIComponent(product.in_stock)}&rating=${encodeURIComponent(product.rating || '')}&theme=light`;
            
            return `
                <a href="${productUrl}" class="block">
                    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden transition-all duration-300 hover:shadow-xl hover:-translate-y-1 group product-card ${isBestDeal ? 'best-deal-glow' : ''}" 
                         data-platform="${product.platform}" 
                         data-price="${product.current_price}" 
                         data-rating="${product.ratingValue}"
                         data-savings="${product.savings}">
                        
                        <!-- Product Image -->
                        <div class="relative aspect-[4/5] overflow-hidden bg-gray-100">
                            <img src="${product.image_url}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/300?text=No+Image';">
                            
                            <!-- Platform Badge -->
                            <div class="absolute top-3 left-3">
                                <span class="px-2 py-1 bg-white/90 backdrop-blur-sm border border-gray-300 rounded-lg text-xs font-medium text-gray-700">
                                    ${product.platform}
                                </span>
                            </div>
                            
                            <!-- Best Deal Badge -->
                            ${isBestDeal ? `
                                <div class="absolute top-3 right-3">
                                    <span class="px-2 py-1 bg-gradient-to-r from-green-500 to-emerald-500 text-white rounded-lg text-xs font-bold shadow-lg">
                                        Best Deal
                                    </span>
                                </div>
                            ` : ''}
                        </div>

                        <!-- Product Content -->
                        <div class="p-5 space-y-3">
                            <!-- Product Name -->
                            <h3 class="font-semibold text-gray-900 line-clamp-2 leading-tight text-sm group-hover:text-blue-600 transition-colors duration-300">
                                ${product.name}
                            </h3>

                            <!-- Rating -->
                            ${product.rating ? `
                                <div class="flex items-center gap-2">
                                    <div class="flex items-center">
                                        ${generateStarRating(product.rating)}
                                        <span class="text-gray-600 text-sm font-medium ml-1">${product.rating}</span>
                                    </div>
                                </div>
                            ` : ''}

                            <!-- Price Comparison -->
                            <div class="space-y-2">
                                <div class="flex items-center justify-between">
                                    <span class="text-xl font-bold text-gray-900">₹${product.current_price}</span>
                                    ${hasDiscount ? `<span class="text-sm text-gray-500 line-through">₹${product.original_price}</span>` : ''}
                                </div>
                                
                                ${hasDiscount ? `
                                    <div class="text-green-600 text-xs font-medium bg-green-50 px-2 py-1 rounded-lg inline-block">
                                        Save ₹${product.savings} (${product.savingsPercentage}%)
                                    </div>
                                ` : ''}
                            </div>

                            <!-- Platform Comparison -->
                            <div class="pt-3 border-t border-gray-200">
                                <div class="flex items-center justify-between">
                                    <span class="inline-flex items-center gap-1.5 px-2 py-1 ${product.in_stock ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'} rounded-lg text-xs font-medium">
                                        <span class="w-1.5 h-1.5 ${product.in_stock ? 'bg-green-500' : 'bg-red-500'} rounded-full pulse-subtle"></span>
                                        ${product.in_stock ? 'In Stock' : 'Out of Stock'}
                                    </span>
                                    
                                    <button onclick="event.stopPropagation(); openProductLink('${product.listing_url}')" class="text-blue-600 hover:text-blue-700 transition-colors duration-300 text-xs font-medium flex items-center gap-1">
                                        View on ${product.platform.charAt(0).toUpperCase() + product.platform.slice(1)}
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }

        // Generate star rating HTML
        function generateStarRating(rating) {
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 >= 0.5;
            const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
            
            let stars = '';
            for (let i = 0; i < fullStars; i++) {
                stars += '<svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>';
            }
            if (hasHalfStar) {
                stars += '<svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>';
            }
            for (let i = 0; i < emptyStars; i++) {
                stars += '<svg class="w-4 h-4 text-gray-300" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>';
            }
            return stars;
        }

        // Generate fallback image
        function generateFallbackImage() {
            return `
                <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-200">
                    <svg class="w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
            `;
        }

        // Open product link
        function openProductLink(url) {
            if (url && url !== 'None') {
                window.open(url, '_blank');
            }
        }

        // Filter products
        function filterProducts(platform) {
            currentFilter = platform;
            
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === platform) {
                    btn.className = 'filter-btn px-3 py-1.5 text-sm font-medium text-white bg-blue-500 rounded-lg hover:bg-blue-600 transition-all duration-300 transform hover:scale-105 ripple';
                } else {
                    btn.className = 'filter-btn px-3 py-1.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 hover:border-gray-400 transition-all duration-300 transform hover:scale-105 ripple';
                }
            });
            
            applyFiltersAndSort();
        }

        // Sort products
        function sortProducts(sortType) {
            currentSort = sortType;
            applyFiltersAndSort();
        }

        // Apply filters and sorting
        function applyFiltersAndSort() {
            showLoading();
            
            setTimeout(() => {
                // Filter
                if (currentFilter === 'all') {
                    filteredProducts = [...allProducts];
                } else {
                    filteredProducts = allProducts.filter(product => product.platform === currentFilter);
                }
                
                // Sort with safe price comparison
                switch (currentSort) {
                    case 'price-low':
                        filteredProducts.sort((a, b) => {
                            const priceA = parseInt(a.current_price) || 0;
                            const priceB = parseInt(b.current_price) || 0;
                            return priceA - priceB;
                        });
                        break;
                    case 'price-high':
                        filteredProducts.sort((a, b) => {
                            const priceA = parseInt(a.current_price) || 0;
                            const priceB = parseInt(b.current_price) || 0;
                            return priceB - priceA;
                        });
                        break;
                    case 'rating':
                        filteredProducts.sort((a, b) => {
                            const ratingA = parseFloat(a.ratingValue) || 0;
                            const ratingB = parseFloat(b.ratingValue) || 0;
                            return ratingB - ratingA;
                        });
                        break;
                    case 'savings':
                        filteredProducts.sort((a, b) => {
                            const savingsA = parseInt(a.savings) || 0;
                            const savingsB = parseInt(b.savings) || 0;
                            return savingsB - savingsA;
                        });
                        break;
                    case 'relevance':
                    default:
                        // Keep original order
                        break;
                }
                
                renderProducts();
                updateResultsCount();
                hideLoading();
            }, 300);
        }

        // Render products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const noResults = document.getElementById('noResultsState');
            const loadMoreContainer = document.getElementById('loadMoreContainer');
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = '';
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                loadMoreContainer.classList.add('hidden');
            } else {
                grid.innerHTML = filteredProducts.map(product => createProductCard(product)).join('');
                grid.classList.remove('hidden');
                noResults.classList.add('hidden');
                loadMoreContainer.classList.remove('hidden');
            }
        }

        // Update results count
        function updateResultsCount() {
            const countElement = document.querySelector('.text-blue-600.font-semibold');
            if (countElement) {
                countElement.textContent = filteredProducts.length;
            }
        }

        // Show loading state
        function showLoading() {
            isLoading = true;
            document.getElementById('productsGrid').classList.add('hidden');
            document.getElementById('loadingSkeletons').classList.remove('hidden');
        }

        // Hide loading state
        function hideLoading() {
            isLoading = false;
            document.getElementById('loadingSkeletons').classList.add('hidden');
        }

        // Retry search
        function retrySearch() {
            window.location.href = '/';
        }

        // Quick search
        function quickSearch(query) {
            window.location.href = `/?query=${encodeURIComponent(query)}`;
        }

        // Load more products (placeholder function)
        function loadMoreProducts() {
            showLoading();
            setTimeout(() => {
                hideLoading();
                // In a real app, this would fetch more products from the API
                alert('Load more functionality would be implemented here');
            }, 1000);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Enhance product data
            allProducts = enhanceProductData(backendProducts);
            filteredProducts = [...allProducts];
            
            // Initial render
            renderProducts();
            updateResultsCount();
            
            // Set initial filter button state
            filterProducts('all');
        });
    </script>
</body>
</html>
